<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>ZapClin limpar cache</title>
<style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#07080d;color:#fff;font-family:system-ui,sans-serif}</style>
</head><body><p id="l">Limpando…</p>
<script>
(async function(){
  try{
    if('serviceWorker' in navigator){for(const r of await navigator.serviceWorker.getRegistrations()) await r.unregister();}
    if(window.caches){for(const k of await caches.keys()) await caches.delete(k);}
    try{sessionStorage.clear();}catch(e){}
    location.replace('./index.html?v=4.32.7&_='+Date.now());
  }catch(e){document.getElementById('l').textContent='Erro. Abra index.html manualmente.';}
})();
</script></body></html>
