<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ZapClin — limpar cache</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#07080d;color:#f5f7ff;font-family:system-ui,sans-serif;padding:24px;text-align:center}
    a{color:#00d4ee}
  </style>
</head>
<body>
  <div>
    <p id="log">Limpando cache…</p>
  </div>
  <script>
  (async function(){
    try{
      if('serviceWorker' in navigator){
        var regs=await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){return r.unregister();}));
      }
      if(window.caches){
        var keys=await caches.keys();
        await Promise.all(keys.map(function(k){return caches.delete(k);}));
      }
      try{sessionStorage.clear();}catch(e){}
      location.replace('./index.html?repaired=1&v=4.32.5&ts='+Date.now());
    }catch(e){
      document.getElementById('log').innerHTML='Falha ao limpar. <a href="./index.html?v=4.32.5">Abrir ZapClin</a>';
    }
  })();
  </script>
</body>
</html>
